name: Automated tests

on:
  push

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repository
        uses: actions/checkout@v6
      - name: setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14.3'
      - name: install dependencies
        run: pip install -r requirements.txt
      - name: run tests
        uses: pytest

